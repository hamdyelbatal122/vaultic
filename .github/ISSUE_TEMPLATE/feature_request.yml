name: Feature request
description: Suggest an improvement for Vaultic
labels: [enhancement]
body:
  - type: input
    id: target_line
    attributes:
      label: Target release line
      placeholder: e.g. Laravel 12 line (v3.3.x)
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the preferred implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any alternative approaches?
